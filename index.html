<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>画像検査アプリ</title>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f5f5f5;
}
video,canvas,img{
    width:90%;
    max-width:400px;
    border:2px solid #333;
    margin:10px;
}
button{
    padding:15px 25px;
    margin:5px;
    font-size:16px;
}
#result{
    font-size:30px;
    font-weight:bold;
}
.ok{color:green;}
.ng{color:red;}
</style>
</head>
<body>

<h1>画像検査システム</h1>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>
<button onclick="captureMaster()">マスター登録</button>
<button onclick="captureInspect()">検査</button>

<h3>マスター画像</h3>
<img id="masterPreview">

<h3>検査画像</h3>
<img id="inspectPreview">

<div id="result"></div>
<div id="score"></div>

<script>
let masterImageData = null;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
})
.then(stream=>{
    video.srcObject = stream;
});

function captureFrame(){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video,0,0);
    return canvas.toDataURL("image/jpeg");
}

function captureMaster(){
    masterImageData = captureFrame();
    document.getElementById("masterPreview").src = masterImageData;
    document.getElementById("result").textContent = "マスター登録完了";
}

function captureInspect(){
    if(!masterImageData){
        alert("先にマスター登録してください");
        return;
    }

    const inspectData = captureFrame();
    document.getElementById("inspectPreview").src = inspectData;

    compareImages(masterImageData, inspectData);
}

function compareImages(masterSrc, inspectSrc){
    const img1 = new Image();
    const img2 = new Image();

    img1.onload = ()=>{
        img2.onload = ()=>{

            let mat1 = cv.imread(img1);
            let mat2 = cv.imread(img2);

            cv.resize(mat2, mat2, mat1.size());

            let diff = new cv.Mat();
            cv.absdiff(mat1, mat2, diff);

            let gray = new cv.Mat();
            cv.cvtColor(diff, gray, cv.COLOR_RGBA2GRAY);

            let thresh = new cv.Mat();
            cv.threshold(gray, thresh, 30, 255, cv.THRESH_BINARY);

            let nonZero = cv.countNonZero(thresh);
            let total = thresh.rows * thresh.cols;
            let diffRate = (nonZero / total) * 100;

            document.getElementById("score").textContent =
                "差分率: " + diffRate.toFixed(2) + "%";

            const resultDiv = document.getElementById("result");

            if(diffRate < 2.0){
                resultDiv.textContent = "OK";
                resultDiv.className = "ok";
            }else{
                resultDiv.textContent = "NG";
                resultDiv.className = "ng";
            }

            mat1.delete();
            mat2.delete();
            diff.delete();
            gray.delete();
            thresh.delete();
        };
        img2.src = inspectSrc;
    };
    img1.src = masterSrc;
}
</script>

</body>
